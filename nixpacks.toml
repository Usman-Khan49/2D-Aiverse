# nixpacks.toml
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @roommind/backend build"]

[start]
cmd = "pnpm --filter @roommind/backend db:migrate && pnpm --filter @roommind/backend start"
